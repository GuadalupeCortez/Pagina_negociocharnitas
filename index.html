<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carnitas Chilo — Pedidos</title>
  <meta name="description" content="Carnitas Don Pepe - Haz tu pedido por WhatsApp o teléfono" />

  <style>
    :root{
      --fondo:#fff7f0;
      --color-principal:#d84315;
      --color-acento:#ffb74d;
      --tarjeta:#ffffff;
      --texto:#2b2b2b;
      --texto-suave:#6b6b6b;
      --sombra:0 6px 18px rgba(0,0,0,0.08);
      --radio:12px;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family: Inter, system-ui, Arial;
      background:linear-gradient(180deg,var(--fondo),#ffe9d6);
      color:var(--texto);
      line-height:1.4;
    }

    header{
      background:var(--color-principal);
      color:#fff;
      padding:28px 16px;
      text-align:center;
      border-bottom-left-radius:18px;
      border-bottom-right-radius:18px;
      box-shadow:var(--sombra);
    }

    main{
      max-width:980px;
      margin:-40px auto 40px;
      padding:18px;
    }

    .card{
      background:var(--tarjeta);
      border-radius:var(--radio);
      padding:18px;
      box-shadow:var(--sombra);
      margin-bottom:18px;
    }

    footer{
      text-align:center;
      color:var(--texto-suave);
      font-size:13px;
      margin-top:22px;
    }
  </style>
</head>

<body>

<header>
  <h1>Carnitas Don Chilo</h1>
  <p>Pedidos por WhatsApp o teléfono</p>
</header>

<main>

  <section class="card">
    <h2>Pedido rápido</h2>

    <a id="botonWhatsapp" href="#" target="_blank">WhatsApp</a>
    <a id="botonTelefono" href="#">📞 Llamar</a>

    <form id="formularioRapido">
      <input type="text" id="nombreCliente" placeholder="Tu nombre" required>
      <input type="text" id="pedidoCliente" placeholder="Ej: 2 kg de carnitas" required>
      <button type="submit">Enviar pedido</button>
    </form>
  </section>

  <footer>
    © <span id="anioActual"></span> Carnitas Chilo
  </footer>

</main>

<script>
  // ===============================
  // CONFIGURACIÓN DEL NEGOCIO
  // ===============================

  const NUMERO_WHATSAPP = "525512345678"; // código país + número
  const NUMERO_TELEFONO = "5551234567";   // número local

  // ===============================
  // ELEMENTOS DEL DOM
  // ===============================

  const botonWhatsapp = document.getElementById('botonWhatsapp');
  const botonTelefono = document.getElementById('botonTelefono');
  const formularioRapido = document.getElementById('formularioRapido');
  const campoNombre = document.getElementById('nombreCliente');
  const campoPedido = document.getElementById('pedidoCliente');
  const anioActual = document.getElementById('anioActual');

  // ===============================
  // AL CARGAR LA PÁGINA
  // ===============================

  document.addEventListener('DOMContentLoaded', () => {

    // Configurar botón de WhatsApp
    const mensajeInicial = encodeURIComponent(
      "Hola, quiero hacer un pedido. Mi nombre es ____ y quiero: "
    );
    botonWhatsapp.href = `https://wa.me/${NUMERO_WHATSAPP}?text=${mensajeInicial}`;

    // Configurar botón de teléfono
    botonTelefono.href = `tel:${NUMERO_TELEFONO}`;

    // Mostrar año actual en el footer
    anioActual.textContent = new Date().getFullYear();
  });

  // ===============================
  // FUNCIÓN PARA ENVIAR PEDIDO
  // ===============================

  function enviarPedidoRapido(evento){
    evento.preventDefault();

    const nombre = campoNombre.value.trim();
    const pedido = campoPedido.value.trim();

    if(!nombre || !pedido){
      alert("Por favor completa tu nombre y pedido.");
      return;
    }

    const mensaje = `Hola, soy ${nombre}. Quiero pedir: ${pedido}. ¿Me confirman precio y horario?`;
    const urlWhatsapp = `https://wa.me/${NUMERO_WHATSAPP}?text=${encodeURIComponent(mensaje)}`;

    window.open(urlWhatsapp, '_blank');
  }

  // ===============================
  // EVENTOS
  // ===============================

  formularioRapido.addEventListener('submit', enviarPedidoRapido);

</script>

</body>
</html>
